name: Bug 反馈
description: 报告可复现的功能异常
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请先搜索现有 Issue，并确保内容中不包含知识库文件、个人路径或凭据。
  - type: input
    id: version
    attributes:
      label: 版本
      description: 请填写提交号、版本号或 Docker 镜像信息。
      placeholder: 例如 main@abcdef0
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: 部署方式
      options:
        - Docker Compose
        - Node.js
        - 其他
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、浏览器以及 Node.js 或 Docker 版本。
      placeholder: 例如 Windows 11 / Edge 126 / Node.js 20
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 出现……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为与日志
      description: 可附截图或脱敏日志，请勿粘贴知识内容、真实路径或凭据。
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，且没有发现重复报告。
          required: true
        - label: 我已移除报告中的知识内容、个人路径与凭据。
          required: true

name: 功能建议
description: 提议新的功能或体验改进
title: "[功能] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: 请先说明实际使用场景，再描述你希望增加的功能。
  - type: textarea
    id: problem
    attributes:
      label: 使用场景与问题
      description: 你在什么情况下遇到了什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 希望知识星云如何解决这个问题？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你尝试过哪些替代方法？此项可选。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，且没有发现相同建议。
          required: true

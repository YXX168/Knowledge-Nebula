name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node --check server.mjs
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: docker compose config
      - run: docker build -t knowledge-nebula:test .
